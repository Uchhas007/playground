<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>🌴 RETRO 80s DASHBOARD</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Press Start 2P", cursive;
        background: linear-gradient(to bottom, #000000, #800080);
        color: #00ffff;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
      }

      .sidebar {
        height: 100vh;
        width: 350px;
        background: linear-gradient(to bottom, #800080, #ff007f);
        padding: 2rem;
        position: fixed;
        top: 0;
        left: 0;
        box-shadow: 0 0 20px rgba(255, 0, 127, 0.8);
        animation: neonPulse 2s infinite ease-in-out;
        overflow-y: auto;
        scrollbar-width: none;
        transition: transform 0.5s ease;
      }

      .sidebar.hidden {
        transform: translateX(-350px);
      }

      .sidebar a {
        display: block;
        margin: 1.5rem 0;
        padding: 1rem;
        border-radius: 5px;
        background: #000;
        color: #00ffff;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .sidebar a:hover {
        background: #ff007f;
        color: #000;
        transform: translateX(10px);
      }

      @keyframes neonPulse {
        0% {
          box-shadow:
            0 0 10px #ff007f,
            0 0 20px #00ffff;
        }
        50% {
          box-shadow:
            0 0 20px #ff007f,
            0 0 40px #00ffff;
        }
        100% {
          box-shadow:
            0 0 10px #ff007f,
            0 0 20px #00ffff;
        }
      }

      .navbar {
        background: #000;
        color: #ff007f;
        padding: 2rem;
        font-size: 1.5rem;
        text-align: center;
        border-bottom: 3px solid #00ffff;
        position: relative;
      }

      .main-content {
        margin-left: 370px;
        padding: 3rem;
        transition: margin-left 0.5s ease;
      }

      .main-content.expanded {
        margin-left: 0;
      }

      .btn-danger {
        background: #ff007f;
        border: none;
        color: #00ffff;
      }

      .toggle-btn {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        background: #ff007f;
        color: #00ffff;
        border: none;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }

      .footer {
        text-align: center;
        margin-top: 4rem;
        font-size: 0.7rem;
      }
    </style>
  </head>

  <body>
    <div class="d-flex">
      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <a href="{{ url_for('admin.admin_dashboard') }}">
          🌴 RETRO DASHBOARD
        </a>

        <a href="/admin/contacts">📼 VHS CALL LOG</a>
        <a href="/admin/projects">🎮 ARCADE PROJECTS</a>
        <a href="/admin/resume">💾 RESUME</a>
        <a href="/admin/skills">🕹️ SKILLS</a>
        <a href="/admin/cv">📺 CV</a>
        <a href="/admin/certificates">🎵 CERTIFICATES</a>
        <a href="/admin/services">🍒 SERVICES</a>
        <a href="/admin/xp">🕶️ XP</a>

        <!-- FIXED LOGOUT -->
        <a href="{{ url_for('admin.logout') }}" class="btn btn-danger w-100">
          🚪 LOGOUT
        </a>
      </div>

      <!-- MAIN CONTENT -->
      <div class="main-content" id="main-content">
        <div class="navbar">
          <button class="toggle-btn" id="toggle-btn">☰</button>
          🌴 RETRO DASHBOARD
        </div>

        <!-- JINJA CONTENT BLOCK -->
        {% block body %}{% endblock %}

        <div class="footer">🕹️ Retro Dashboard System</div>
      </div>
    </div>

    <!-- JS -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const sidebar = document.getElementById("sidebar");
        const mainContent = document.getElementById("main-content");
        const toggleBtn = document.getElementById("toggle-btn");

        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => {
            sidebar.classList.toggle("hidden");
            mainContent.classList.toggle("expanded");
          });
        }

        // SAFE logout handling (no redirect bug)
        const logoutBtn = document.querySelector(".btn-danger");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", () => {
            alert("Logging out...");
          });
        }
      });
    </script>
  </body>
</html>
